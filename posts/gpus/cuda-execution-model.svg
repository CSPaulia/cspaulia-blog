<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">CUDA execution model</title>
  <desc id="desc">A diagram showing CUDA blocks assigned to SMs, blocks divided into warps, and warp schedulers issuing instructions to execution lanes.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 18px Arial, sans-serif; fill: #111827; }
    .label { font: 14px Arial, sans-serif; fill: #111827; }
    .small { font: 12px Arial, sans-serif; fill: #374151; }
    .box { stroke: #374151; stroke-width: 1.4; }
    .arrow { stroke: #2563eb; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>

  <rect width="920" height="360" fill="#ffffff"/>

  <text x="150" y="28" text-anchor="middle" class="title">CUDA program</text>
  <rect x="28" y="48" width="244" height="78" rx="12" fill="#dbeafe" class="box"/>
  <rect x="52" y="75" width="58" height="32" fill="#fef3c7" class="box"/>
  <rect x="124" y="75" width="58" height="32" fill="#fef3c7" class="box"/>
  <text x="81" y="96" text-anchor="middle" class="small">Block 0</text>
  <text x="153" y="96" text-anchor="middle" class="small">Block 1</text>
  <text x="205" y="96" text-anchor="middle" class="label">...</text>
  <rect x="222" y="75" width="36" height="32" fill="#fef3c7" class="box"/>
  <text x="240" y="96" text-anchor="middle" class="small">B n</text>

  <text x="150" y="168" text-anchor="middle" class="title">GPU SMs</text>
  <rect x="38" y="194" width="76" height="86" fill="#dcfce7" class="box"/>
  <rect x="126" y="194" width="76" height="86" fill="#dcfce7" class="box"/>
  <rect x="214" y="194" width="76" height="86" fill="#dcfce7" class="box"/>
  <text x="76" y="242" text-anchor="middle" class="label">SM 0</text>
  <text x="164" y="242" text-anchor="middle" class="label">SM 1</text>
  <text x="252" y="242" text-anchor="middle" class="label">SM n</text>
  <path d="M82 107 C82 145, 76 158, 76 190" class="arrow"/>
  <path d="M153 107 C153 145, 164 158, 164 190" class="arrow"/>
  <path d="M240 107 C240 145, 252 158, 252 190" class="arrow"/>
  <text x="150" y="310" text-anchor="middle" class="small">Blocks are assigned to SMs</text>

  <text x="480" y="28" text-anchor="middle" class="title">One block</text>
  <rect x="398" y="48" width="164" height="252" rx="14" fill="#fff7ed" class="box"/>
  <rect x="424" y="72" width="112" height="32" fill="#ffedd5" class="box"/>
  <rect x="424" y="116" width="112" height="32" fill="#ffedd5" class="box"/>
  <text x="480" y="93" text-anchor="middle" class="small">Warp 0</text>
  <text x="480" y="137" text-anchor="middle" class="small">Warp 1</text>
  <text x="480" y="180" text-anchor="middle" class="label">...</text>
  <rect x="424" y="244" width="112" height="32" fill="#ffedd5" class="box"/>
  <text x="480" y="265" text-anchor="middle" class="small">Warp 7</text>
  <text x="480" y="322" text-anchor="middle" class="small">Each warp has 32 consecutive threads</text>
  <path d="M290 237 C340 237, 350 174, 394 174" class="arrow"/>

  <text x="746" y="28" text-anchor="middle" class="title">Inside one SM</text>
  <rect x="642" y="58" width="82" height="36" rx="6" fill="#fecaca" class="box"/>
  <rect x="766" y="58" width="82" height="36" rx="6" fill="#fecaca" class="box"/>
  <text x="683" y="80" text-anchor="middle" class="small">Scheduler</text>
  <text x="807" y="80" text-anchor="middle" class="small">Scheduler</text>
  <rect x="622" y="126" width="102" height="150" fill="#bbf7d0" class="box"/>
  <rect x="746" y="126" width="102" height="150" fill="#bbf7d0" class="box"/>
  <text x="673" y="150" text-anchor="middle" class="small">INT / FP lanes</text>
  <text x="797" y="150" text-anchor="middle" class="small">INT / FP lanes</text>
  <g fill="#65a30d" stroke="#374151" stroke-width="1">
    <rect x="642" y="168" width="22" height="22"/><rect x="666" y="168" width="22" height="22"/><rect x="690" y="168" width="22" height="22"/>
    <rect x="642" y="194" width="22" height="22"/><rect x="666" y="194" width="22" height="22"/><rect x="690" y="194" width="22" height="22"/>
    <rect x="766" y="168" width="22" height="22"/><rect x="790" y="168" width="22" height="22"/><rect x="814" y="168" width="22" height="22"/>
    <rect x="766" y="194" width="22" height="22"/><rect x="790" y="194" width="22" height="22"/><rect x="814" y="194" width="22" height="22"/>
  </g>
  <path d="M683 94 L683 122" class="arrow"/>
  <path d="M807 94 L807 122" class="arrow"/>
  <path d="M536 132 C590 132, 588 76, 638 76" class="arrow"/>
  <text x="746" y="310" text-anchor="middle" class="small">Warp schedulers issue one instruction to a warp</text>
</svg>
