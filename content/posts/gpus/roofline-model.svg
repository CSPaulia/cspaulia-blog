<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Roofline model concept</title>
  <desc id="desc">A simplified roofline model showing memory-bound and compute-bound regions.</desc>
  <rect width="960" height="560" fill="#f7f4ef"/>

  <line x1="110" y1="450" x2="850" y2="450" stroke="#1f2937" stroke-width="3"/>
  <line x1="110" y1="450" x2="110" y2="90" stroke="#1f2937" stroke-width="3"/>
  <polygon points="850,450 830,440 830,460" fill="#1f2937"/>
  <polygon points="110,90 100,110 120,110" fill="#1f2937"/>

  <text x="480" y="512" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#111827">Arithmetic Intensity：每搬一次数据能做多少计算</text>
  <text x="42" y="290" text-anchor="middle" transform="rotate(-90 42 290)" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="24" fill="#111827">Performance：实际能跑到多快</text>

  <line x1="155" y1="420" x2="430" y2="170" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
  <line x1="430" y1="170" x2="810" y2="170" stroke="#dc2626" stroke-width="8" stroke-linecap="round"/>

  <text x="250" y="300" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="26" font-weight="700" fill="#2563eb">Memory-bound</text>
  <text x="250" y="334" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" fill="#374151">数据搬得不够快</text>

  <text x="625" y="135" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="26" font-weight="700" fill="#dc2626">Compute-bound</text>
  <text x="625" y="212" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" fill="#374151">已经接近算力上限</text>

  <path d="M420 385 C 510 350, 615 320, 710 250" fill="none" stroke="#059669" stroke-width="4" stroke-dasharray="10 10"/>
  <polygon points="720,242 699,248 713,262" fill="#059669"/>
  <text x="590" y="365" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#059669">优化方向</text>
  <text x="590" y="395" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="19" fill="#374151">提高数据复用，让计算单元吃饱</text>

  <circle cx="270" cy="365" r="10" fill="#f59e0b"/>
  <circle cx="560" cy="210" r="10" fill="#f59e0b"/>
  <text x="270" y="402" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" fill="#374151">低复用算子</text>
  <text x="560" y="246" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" fill="#374151">高复用 matmul</text>
</svg>
